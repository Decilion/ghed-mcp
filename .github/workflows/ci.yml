name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Editable-install metadata matches __version__
        run: |
          python -c "import importlib.metadata as md, ghed_mcp; \
            assert md.version('mcp-server-ghed') == ghed_mcp.__version__, \
            f'metadata={md.version(\"mcp-server-ghed\")} version={ghed_mcp.__version__}'"
      - name: Build sdist + wheel
        run: python -m build
      - name: twine check
        run: python -m twine check dist/*
      - name: Install built wheel into a fresh venv
        run: |
          python -m venv /tmp/wheelvenv
          /tmp/wheelvenv/bin/pip install --upgrade pip
          /tmp/wheelvenv/bin/pip install dist/mcp_server_ghed-*-py3-none-any.whl
          /tmp/wheelvenv/bin/python -c "import importlib.metadata as md, ghed_mcp; \
            assert md.version('mcp-server-ghed') == ghed_mcp.__version__"
          /tmp/wheelvenv/bin/python -c "from ghed_mcp.server import mcp; \
            assert type(mcp).__name__ == 'FastMCP'"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
