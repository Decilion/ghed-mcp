name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Editable-install metadata matches __version__
        run: |
          python -c "import importlib.metadata as md, ghed_mcp; \
            assert md.version('mcp-server-ghed') == ghed_mcp.__version__, \
            f'metadata={md.version(\"mcp-server-ghed\")} version={ghed_mcp.__version__}'"
      - name: Build sdist + wheel
        run: python -m build
      - name: twine check
        run: python -m twine check dist/*
      - name: Verify sdist contents
        run: |
          python -c "
          import glob, sys, tarfile
          (path,) = glob.glob('dist/mcp_server_ghed-*.tar.gz')
          with tarfile.open(path) as t:
              names = t.getnames()
          required = ['assets/decilion-banner.png', 'assets/decilion-banner.svg',
                      'LICENSE', 'README.md', 'CHANGELOG.md']
          forbidden = ['AGENT.md', 'CLAUDE.md', 'dev-notes/']
          missing = [r for r in required if not any(r in n for n in names)]
          leaked = [f for f in forbidden if any(f in n for n in names)]
          if missing:
              sys.exit(f'sdist missing required files: {missing}')
          if leaked:
              sys.exit(f'sdist leaked files that should be excluded: {leaked}')
          print('sdist contents OK')
          "
      - name: Install built wheel into a fresh venv
        run: |
          python -m venv /tmp/wheelvenv
          /tmp/wheelvenv/bin/pip install --upgrade pip
          /tmp/wheelvenv/bin/pip install dist/mcp_server_ghed-*-py3-none-any.whl
          /tmp/wheelvenv/bin/python -c "import importlib.metadata as md, ghed_mcp; \
            assert md.version('mcp-server-ghed') == ghed_mcp.__version__"
          /tmp/wheelvenv/bin/python -c "from ghed_mcp.server import mcp; \
            assert type(mcp).__name__ == 'FastMCP'"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
